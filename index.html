const semaforo=(m)=>{const dias=diasNoEstoque(m);const mep=custoTotal(m)>0?(margemEsp(m)/custoTotal(m))*100:0;if(dias===null)return null;if(dias>60)return"red";if(dias>30||mep<10)return"yellow";return"green";};

    </div>

        <div style={{display:"flex",gap:8}}>
          <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="🔍 Buscar marca, placa, nome..." style={{flex:1,border:"1.5px solid #ddd",borderRadius:12,padding:"11px 14px",fontSize:15,outline:"none",background:"#fff"}}/>
          <select value={fst} onChange={e=>setFst(e.target.value)} style={{border:"1.5px solid #ddd",borderRadius:12,padding:"11px 12px",fontSize:14,background:"#fff",outline:"none",WebkitAppearance:"none"}}>
            <option>Todos</option>{Object.keys(SC).map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        {mf.length===0?<div style={{textAlign:"center",padding:"50px 0",color:"#aaa"}}><p style={{fontSize:48}}>🏍️</p><p style={{fontWeight:600,fontSize:15,marginTop:8}}>{busca?"Nenhuma moto encontrada":"Nenhuma moto cadastrada ainda"}</p></div>
        :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>{mf.map(m=><Mc key={m.id} moto={m} onClick={()=>{setEdit(m);setTela("editar");}} totalCustoEstoque={totalCustoEstoque} usuario={usuario}/>)}</div>}
      </div>)}
      {tela==="contas"&&isMaster&&<Co contas={contas} onSave={sc}/>}
      {tela==="financeiro"&&<Fn motos={motos} financeiro={fin} onAdd={async i=>await sf([...fin,i])} onRem={async id=>await sf(fin.filter(f=>f.id!==id))} usuario={usuario}/>}
      {tela==="relatorios"&&<Rl motos={motos} usuario={usuario}/>}
      {tela==="ia"&&<Ia motos={motos}/>}
      {tela==="nova"&&(<div style={{background:"#fff",borderRadius:16,padding:20,border:"1.5px solid #eee"}}>
        <h2 style={{margin:"0 0 20px",fontSize:19}}>🏍️ Cadastrar Nova Moto</h2>
        <Mf onSave={savMoto} onCancel={()=>setTela("estoque")} usuario={usuario}/>
      </div>)}
      {tela==="editar"&&edit&&(<div style={{background:"#fff",borderRadius:16,padding:20,border:"1.5px solid #eee"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{margin:0,fontSize:18,flex:1,marginRight:10}}>{edit.marca} {edit.modelo}<br/><span style={{fontSize:13,color:"#888",fontWeight:400}}>{edit.placa}</span></h2>
          {isMaster&&<button onClick={()=>delMoto(edit.id)} style={{background:"#fce4ec",color:"#c62828",border:"none",borderRadius:10,padding:"8px 14px",cursor:"pointer",fontSize:13,fontWeight:700}}>🗑️ Remover</button>}
        </div>
        <Mf initial={edit} onSave={savMoto} onCancel={()=>{setTela("estoque");setEdit(null);}} usuario={usuario}/>
      </div>)}
    </div>
  </div>);}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
