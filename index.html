async function getOrCreateBin(name,initial){
  const cached=localStorage.getItem("ptk_bin_"+name);
  if(cached)return cached;
  const res=await fetch("https://api.jsonbin.io/v3/b",{method:"POST",headers:{...HEADERS,"X-Bin-Name":name},body:JSON.stringify(initial)});
  const data=await res.json();
  const id=data.metadata?.id;
  if(id)localStorage.setItem("ptk_bin_"+name,id);
  return id;
}

  const totalCustos=motos.reduce((s,m)=>s+(m.custos||[]).reduce((a,c)=>a+Number(c.val),0),0);
  const totalCompras=motos.reduce((s,m)=>s+Number(m.valorCompra||0),0);
  const totalVendas=vendidas.reduce((s,m)=>s+Number(m.valorVenda||0),0);
  const lucroLiq=totalVendas-vendidas.reduce((s,m)=>s+Number(m.valorCompra||0),0)-vendidas.reduce((s,m)=>s+(m.custos||[]).reduce((a,c)=>a+Number(c.val),0),0);
  const Card=({label,value,sub,color})=>(<div style={{background:"#fff",border:"1.5px solid #eee",borderRadius:14,padding:18,boxShadow:"0 1px 4px #0001"}}><p style={{margin:0,fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:".5px"}}>{label}</p><p style={{margin:"6px 0 0",fontSize:22,fontWeight:900,color:color||"#1a1a1a"}}>{value}</p>{sub&&<p style={{margin:"2px 0 0",fontSize:11,color:"#aaa"}}>{sub}</p>}</div>);
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
      <Card label="Em Estoque" value={estoque.length} sub="disponíveis" color="#1565c0"/>
      <Card label="Vendidas" value={vendidas.length} sub="total" color="#b71c1c"/>
      <Card label="Em Reforma" value={reforma.length} sub="aguardando" color="#e65100"/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12}}>
      <Card label="Total Investido" value={fmt(totalCompras)} color="#37474f"/>
      <Card label="Custos Extras" value={fmt(totalCustos)} color="#c62828"/>
      <Card label="Total em Vendas" value={fmt(totalVendas)} color="#1b5e20"/>
      <Card label="Lucro Líquido" value={fmt(lucroLiq)} color={lucroLiq>=0?"#2e7d32":"#b71c1c"}/>
    </div>
    {motos.length>0&&(<div style={{background:"#fff",border:"1.5px solid #eee",borderRadius:14,padding:20}}>
      <p style={{margin:"0 0 12px",fontWeight:700,fontSize:14}}>Últimas cadastradas</p>
      {[...motos].reverse().slice(0,5).map(m=>(<div key={m.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #f0f0f0",fontSize:13}}>
        <span><b>{m.marca} {m.modelo}</b> · {m.placa}</span>
        <span style={{color:STATUS_CORES[m.status]?.text}}>{m.status}</span>
      </div>))}
    </div>)}
  </div>);}
function Financeiro({motos,financeiro,onAddFin,onRemFin}){
  const [desc,setDesc]=useState("");const [val,setVal]=useState("");
  const [tipo,setTipo]=useState("Saída");const [data,setData]=useState(today());const [cat,setCat]=useState("Outros");
  const CATS=["Aluguel","Salário","Conta de luz/água","Marketing","Equipamentos","Impostos","Outros"];
  const movMotos=motos.flatMap(m=>{const r=[];
    if(m.valorCompra&&m.dataCompra)r.push({id:"c"+m.id,desc:`Compra: ${m.marca} ${m.modelo} (${m.placa})`,val:Number(m.valorCompra),tipo:"Saída",data:m.dataCompra,cat:"Compra de Moto"});
    (m.custos||[]).forEach(c=>r.push({id:"k"+c.id,desc:`Custo: ${c.desc} — ${m.marca} ${m.modelo}`,val:Number(c.val),tipo:"Saída",data:c.data,cat:c.cat}));
    if(m.valorVenda&&m.dataVenda)r.push({id:"v"+m.id,desc:`Venda: ${m.marca} ${m.modelo} (${m.placa})`,val:Number(m.valorVenda),tipo:"Entrada",data:m.dataVenda,cat:"Venda de Moto"});
    return r;});
  const todos=[...movMotos,...financeiro].sort((a,b)=>b.data.localeCompare(a.data));
  const entradas=todos.filter(x=>x.tipo==="Entrada").reduce((s,x)=>s+x.val,0);
  const saidas=todos.filter(x=>x.tipo==="Saída").reduce((s,x)=>s+x.val,0);
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
      {[["Entradas",entradas,"#2e7d32"],["Saídas",saidas,"#b71c1c"],["Saldo",entradas-saidas,(entradas-saidas)>=0?"#1565c0":"#b71c1c"]].map(([l,v,c])=>(<div key={l} style={{background:"#fff",border:"1.5px solid #eee",borderRadius:14,padding:16}}><p style={{margin:0,fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase"}}>{l}</p><p style={{margin:"6px 0 0",fontSize:22,fontWeight:900,color:c}}>{fmt(v)}</p></div>))}
    </div>
    <div style={{background:"#fff",border:"1.5px solid #eee",borderRadius:14,padding:20}}>
      <p style={{margin:"0 0 12px",fontWeight:700,fontSize:14}}>Lançamento manual</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div style={{gridColumn:"1/-1"}}><Field label="Descrição" value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Ex: Conta de luz"/></div>
        <Field label="Valor (R$)" type="number" value={val} onChange={e=>setVal(e.target.value)}/>
        <Sel label="Tipo" value={tipo} onChange={e=>setTipo(e.target.value)}><option>Saída</option><option>Entrada</option></Sel>
        <Sel label="Categoria" value={cat} onChange={e=>setCat(e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</Sel>
        <Field label="Data" type="date" value={data} onChange={e=>setData(e.target.value)}/>
      </div>
      <button onClick={()=>{if(!val||!desc)return;onAddFin({id:uid(),desc,val:Number(val),tipo,data,cat});setDesc("");setVal("");}} style={{marginTop:12,padding:"9px 20px",border:"none",borderRadius:8,background:"#c62828",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13}}>+ Adicionar</button>
    </div>
    <div style={{background:"#fff",border:"1.5px solid #eee",borderRadius:14,overflow:"hidden"}}>
      <p style={{margin:0,padding:"14px 20px",fontWeight:700,fontSize:14,borderBottom:"1px solid #eee"}}>Extrato completo</p>
      {todos.length===0&&<p style={{padding:20,color:"#aaa",fontSize:13,textAlign:"center"}}>Nenhum lançamento ainda.</p>}
      {todos.map(x=>(<div key={x.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",borderBottom:"1px solid #f5f5f5"}}>
        <span style={{fontSize:18}}>{x.tipo==="Entrada"?"📈":"📉"}</span>
        <div style={{flex:1}}><p style={{margin:0,fontSize:13,fontWeight:600}}>{x.desc}</p><p style={{margin:0,fontSize:11,color:"#aaa"}}>{x.cat} · {fmtDate(x.data)}</p></div>
        <span style={{fontWeight:700,color:x.tipo==="Entrada"?"#2e7d32":"#c62828"}}>{x.tipo==="Entrada"?"+":"-"}{fmt(x.val)}</span>
        {!x.id.startsWith("c")&&!x.id.startsWith("v")&&!x.id.startsWith("k")&&(<button onClick={()=>onRemFin(x.id)} style={{border:"none",background:"none",color:"#ccc",cursor:"pointer",fontSize:14}}>✕</button>)}
      </div>))}
    </div>
  </div>);}function Relatorios({motos}){
  const vendidas=motos.filter(m=>m.status==="Vendida"&&m.dataVenda);
  const porMoto=vendidas.map(m=>{const custos=(m.custos||[]).reduce((s,c)=>s+Number(c.val),0);const lucro=Number(m.valorVenda||0)-Number(m.valorCompra||0)-custos;const dias=m.dataCompra&&m.dataVenda?Math.round((new Date(m.dataVenda)-new Date(m.dataCompra))/86400000):null;return{...m,lucro,custos,dias};}).sort((a,b)=>b.lucro-a.lucro);
  const porMes={};vendidas.forEach(m=>{const mes=mesAno(m.dataVenda);if(!porMes[mes])porMes[mes]={lucro:0,qtd:0};const custos=(m.custos||[]).reduce((s,c)=>s+Number(c.val),0);porMes[mes].lucro+=Number(m.valorVenda||0)-Number(m.valorCompra||0)-custos;porMes[mes].qtd++;});
  const melhor=porMoto[0];const mediaLucro=porMoto.length?porMoto.reduce((s,m)=>s+m.lucro,0)/porMoto.length:0;const comDias=porMoto.filter(m=>m.dias!==null);const mediaDias=comDias.length?comDias.reduce((s,m)=>s+m.dias,0)/comDias.length:null;const maxLucroMes=Math.max(...Object.values(porMes).map(x=>Math.abs(x.lucro)),1);
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12}}>
      <div style={{background:"#fff",border:"1.5px solid #eee",borderRadius:14,padding:18}}><p style={{margin:0,fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase"}}>Lucro médio por moto</p><p style={{margin:"6px 0 0",fontSize:22,fontWeight:900,color:mediaLucro>=0?"#2e7d32":"#b71c1c"}}>{fmt(mediaLucro)}</p></div>
      <div style={{background:"#fff",border:"1.5px solid #eee",borderRadius:14,padding:18}}><p style={{margin:0,fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase"}}>Tempo médio em estoque</p><p style={{margin:"6px 0 0",fontSize:22,fontWeight:900,color:"#1565c0"}}>{mediaDias!==null?`${Math.round(mediaDias)} dias`:"—"}</p></div>
      {melhor&&(<div style={{background:"#f1f8e9",border:"1.5px solid #a5d6a7",borderRadius:14,padding:18,gridColumn:"1/-1"}}><p style={{margin:0,fontSize:11,fontWeight:700,color:"#2e7d32",textTransform:"uppercase"}}>🏆 Moto mais lucrativa</p><p style={{margin:"6px 0 0",fontSize:16,fontWeight:800}}>{melhor.marca} {melhor.modelo} · {melhor.placa}</p><p style={{margin:"2px 0 0",fontSize:13,color:"#555"}}>Lucro líquido: <b style={{color:"#2e7d32"}}>{fmt(melhor.lucro)}</b></p></div>)}
    </div>
    {Object.keys(porMes).length>0&&(<div style={{background:"#fff",border:"1.5px solid #eee",borderRadius:14,padding:20}}><p style={{margin:"0 0 12px",fontWeight:700,fontSize:14}}>Lucro por mês</p>
      {Object.entries(porMes).map(([mes,d])=>(<div key={mes} style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
        <span style={{fontSize:12,color:"#888",minWidth:80}}>{mes}</span>
        <div style={{flex:1,background:"#f5f5f5",borderRadius:20,height:10,overflow:"hidden"}}><div style={{width:`${Math.min(100,Math.abs(d.lucro)/maxLucroMes*100)}%`,height:"100%",background:d.lucro>=0?"#43a047":"#e53935",borderRadius:20}}/></div>
        <span style={{fontSize:12,fontWeight:700,minWidth:90,textAlign:"right",color:d.lucro>=0?"#2e7d32":"#b71c1c"}}>{fmt(d.lucro)}</span>
        <span style={{fontSize:11,color:"#aaa"}}>{d.qtd} moto{d.qtd>1?"s":""}</span>
      </div>))}
    </div>)}
    {porMoto.length>0&&(<div style={{background:"#fff",border:"1.5px solid #eee",borderRadius:14,overflow:"hidden"}}><p style={{margin:0,padding:"14px 20px",fontWeight:700,fontSize:14,borderBottom:"1px solid #eee"}}>Detalhamento por moto vendida</p>
      {porMoto.map(m=>(<div key={m.id} style={{padding:"12px 16px",borderBottom:"1px solid #f5f5f5"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><p style={{margin:0,fontWeight:700,fontSize:13}}>{m.marca} {m.modelo} · {m.placa}</p><p style={{margin:"2px 0 0",fontSize:11,color:"#aaa"}}>Compra: {fmt(m.valorCompra)} · Custos: {fmt(m.custos)} · Venda: {fmt(m.valorVenda)}{m.dias!==null&&` · ${m.dias} dias`}</p></div><span style={{fontWeight:800,fontSize:14,color:m.lucro>=0?"#2e7d32":"#b71c1c"}}>{fmt(m.lucro)}</span></div></div>))}
    </div>)}
    {porMoto.length===0&&(<div style={{textAlign:"center",padding:"40px 0",color:"#aaa"}}><p style={{fontSize:36}}>📊</p><p style={{fontWeight:600}}>Ainda não há motos vendidas para analisar</p></div>)}
  </div>);}
function App(){
  const [motos,setMotos]=useState([]);const [financeiro,setFinanceiro]=useState([]);
  const [binMotos,setBinMotos]=useState(null);const [binFin,setBinFin]=useState(null);
  const [tela,setTela]=useState("dashboard");const [editando,setEditando]=useState(null);
  const [busca,setBusca]=useState("");const [filtroStatus,setFiltroStatus]=useState("Todos");
  const [loading,setLoading]=useState(true);const [salvando,setSalvando]=useState(false);const [erro,setErro]=useState(null);
  useEffect(()=>{async function init(){try{const[bm,bf]=await Promise.all([getOrCreateBin("ptk_motos",[]),getOrCreateBin("ptk_financeiro",[])]);setBinMotos(bm);setBinFin(bf);const[m,f]=await Promise.all([readBin(bm),readBin(bf)]);setMotos(Array.isArray(m)?m:[]);setFinanceiro(Array.isArray(f)?f:[]);}catch(e){setErro("Erro ao conectar. Verifique sua conexão.");}finally{setLoading(false);}}init();},[]);
  const salvarMotos=async nova=>{setSalvando(true);setMotos(nova);try{await writeBin(binMotos,nova);}catch{alert("Erro ao salvar.");}setSalvando(false);};
  const salvarFin=async nova=>{setSalvando(true);setFinanceiro(nova);try{await writeBin(binFin,nova);}catch{alert("Erro ao salvar.");}setSalvando(false);};
  const salvarMoto=async moto=>{const nova=editando?motos.map(m=>m.id===moto.id?moto:m):[...motos,moto];await salvarMotos(nova);setTela("estoque");setEditando(null);};
  const deletarMoto=async id=>{if(!confirm("Remover esta moto?"))return;await salvarMotos(motos.filter(m=>m.id!==id));setTela("estoque");setEditando(null);};
  const addFin=async item=>await salvarFin([...financeiro,item]);
  const remFin=async id=>await salvarFin(financeiro.filter(f=>f.id!==id));
  const motosFiltradas=motos.filter(m=>{const q=busca.toLowerCase();const match=!q||[m.marca,m.modelo,m.placa,m.vendedorNome,m.compradorNome,m.chassi].some(v=>(v||"").toLowerCase().includes(q));return match&&(filtroStatus==="Todos"||m.status===filtroStatus);});
  const NAV=[{id:"dashboard",icon:"📊",label:"Painel"},{id:"estoque",icon:"🏍️",label:"Estoque"},{id:"financeiro",icon:"💰",label:"Financeiro"},{id:"relatorios",icon:"📈",label:"Relatórios"}];
  if(loading)return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:12}}><span style={{fontSize:40}}>🏍️</span><p style={{color:"#c62828",fontWeight:700,fontSize:16}}>Conectando ao banco de dados...</p></div>);
  if(erro)return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:12,padding:20,textAlign:"center"}}><span style={{fontSize:40}}>⚠️</span><p style={{color:"#c62828",fontWeight:700}}>{erro}</p><button onClick={()=>window.location.reload()} style={{padding:"10px 20px",background:"#c62828",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700}}>Tentar novamente</button></div>);
  return(<div style={{fontFamily:"system-ui,-apple-system,sans-serif",background:"#f7f7f7",minHeight:"100vh"}}>
    <div style={{background:"#c62828",color:"#fff",padding:"0 20px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56,boxShadow:"0 2px 8px #0003",position:"sticky",top:0,zIndex:100}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:22}}>🏍️</span><div><p style={{margin:0,fontWeight:900,fontSize:16,lineHeight:1}}>PTK MOTOS</p><p style={{margin:0,fontSize:10,opacity:.8,lineHeight:1}}>{salvando?"Salvando...":"Gestão Interna · Online ✓"}</p></div></div>
      {["dashboard","estoque"].includes(tela)&&<button onClick={()=>{setEditando(null);setTela("nova");}} style={{background:"#fff",color:"#c62828",border:"none",borderRadius:8,padding:"7px 14px",fontWeight:700,cursor:"pointer",fontSize:13}}>+ Nova Moto</button>}
      {["nova","editar"].includes(tela)&&<button onClick={()=>{setTela("estoque");setEditando(null);}} style={{background:"transparent",color:"#fff",border:"1px solid #ffffff66",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:13}}>← Voltar</button>}
    </div>
    <div style={{background:"#fff",borderBottom:"1.5px solid #eee",display:"flex",padding:"0 12px",overflowX:"auto",position:"sticky",top:56,zIndex:99}}>
      {NAV.map(n=>(<button key={n.id} onClick={()=>setTela(n.id)} style={{background:"none",border:"none",padding:"12px 14px",cursor:"pointer",fontSize:13,fontWeight:600,whiteSpace:"nowrap",color:tela===n.id?"#c62828":"#666",borderBottom:tela===n.id?"2.5px solid #c62828":"2.5px solid transparent"}}>{n.icon} {n.label}</button>))}
    </div>
    <div style={{maxWidth:900,margin:"0 auto",padding:"20px 16px"}}>
      {tela==="dashboard"&&<Dashboard motos={motos}/>}
      {tela==="estoque"&&(<div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="🔍 Buscar por marca, placa, nome..." style={{flex:1,minWidth:180,border:"1.5px solid #ddd",borderRadius:8,padding:"9px 12px",fontSize:14,outline:"none"}}/>
          <select value={filtroStatus} onChange={e=>setFiltroStatus(e.target.value)} style={{border:"1.5px solid #ddd",borderRadius:8,padding:"9px 12px",fontSize:14,background:"#fff",outline:"none"}}><option>Todos</option>{Object.keys(STATUS_CORES).map(s=><option key={s}>{s}</option>)}</select>
        </div>
        {motosFiltradas.length===0?<div style={{textAlign:"center",padding:"40px 0",color:"#aaa"}}><p style={{fontSize:40}}>🏍️</p><p style={{fontWeight:600}}>{busca?"Nenhuma moto encontrada":"Nenhuma moto cadastrada"}</p></div>
        :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14}}>{motosFiltradas.map(m=><MotoCard key={m.id} moto={m} onClick={()=>{setEditando(m);setTela("editar");}}/>)}</div>}
      </div>)}
      {tela==="financeiro"&&<Financeiro motos={motos} financeiro={financeiro} onAddFin={addFin} onRemFin={remFin}/>}
      {tela==="relatorios"&&<Relatorios motos={motos}/>}
      {tela==="nova"&&(<div style={{background:"#fff",borderRadius:16,padding:24,border:"1.5px solid #eee"}}><h2 style={{margin:"0 0 20px",fontSize:18}}>Cadastrar Nova Moto</h2><MotoForm onSave={salvarMoto} onCancel={()=>setTela("estoque")}/></div>)}
      {tela==="editar"&&editando&&(<div style={{background:"#fff",borderRadius:16,padding:24,border:"1.5px solid #eee"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{margin:0,fontSize:18}}>{editando.marca} {editando.modelo} · {editando.placa}</h2>
          <button onClick={()=>deletarMoto(editando.id)} style={{background:"#fff",color:"#c62828",border:"1.5px solid #c62828",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}>🗑️ Remover</button>
        </div>
        <MotoForm initial={editando} onSave={salvarMoto} onCancel={()=>{setTela("estoque");setEditando(null);}}/>
      </div>)}
    </div>
  </div>);}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
