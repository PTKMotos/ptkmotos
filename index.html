      <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:22}}>🏍️</span><div><p style={{margin:0,fontWeight:900,fontSize:16,lineHeight:1}}>PTK MOTOS</p><p style={{margin:0,fontSize:10,opacity:.8,lineHeight:1}}>{salv?"Salvando...":"Online"}</p></div></div>
      {["dashboard","estoque"].includes(tela)&&<button onClick={()=>{setEdit(null);setTela("nova");}} style={{background:"#fff",color:"#c62828",border:"none",borderRadius:8,padding:"7px 14px",fontWeight:700,cursor:"pointer",fontSize:13}}>+ Nova Moto</button>}
      {["nova","editar"].includes(tela)&&<button onClick={()=>{setTela("estoque");setEdit(null);}} style={{background:"transparent",color:"#fff",border:"1px solid #ffffff66",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:13}}>Voltar</button>}
    </div>
    <div style={{background:"#fff",borderBottom:"1.5px solid #eee",display:"flex",padding:"0 12px",overflowX:"auto",position:"sticky",top:56,zIndex:99}}>
      {NV.map(n=>(<button key={n.id} onClick={()=>setTela(n.id)} style={{background:"none",border:"none",padding:"12px 14px",cursor:"pointer",fontSize:13,fontWeight:600,whiteSpace:"nowrap",color:tela===n.id?"#c62828":"#666",borderBottom:tela===n.id?"2.5px solid #c62828":"2.5px solid transparent"}}>{n.icon} {n.label}</button>))}
    </div>
    <div style={{maxWidth:900,margin:"0 auto",padding:"20px 16px"}}>
      {tela==="dashboard"&&<Db motos={motos}/>}
      {tela==="estoque"&&(<div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar marca, placa, nome..." style={{flex:1,minWidth:180,border:"1.5px solid #ddd",borderRadius:8,padding:"9px 12px",fontSize:14,outline:"none"}}/>
          <select value={fst} onChange={e=>setFst(e.target.value)} style={{border:"1.5px solid #ddd",borderRadius:8,padding:"9px 12px",fontSize:14,background:"#fff",outline:"none"}}><option>Todos</option>{Object.keys(SC).map(s=><option key={s}>{s}</option>)}</select>
        </div>
        {mf.length===0?<div style={{textAlign:"center",padding:"40px 0",color:"#aaa"}}><p style={{fontSize:40}}>🏍️</p><p style={{fontWeight:600}}>{busca?"Nenhuma moto encontrada":"Nenhuma moto cadastrada"}</p></div>
        :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14}}>{mf.map(m=><Mc key={m.id} moto={m} onClick={()=>{setEdit(m);setTela("editar");}}/>)}</div>}
      </div>)}
      {tela==="contas"&&<Co contas={contas} onSave={sc}/>}
      {tela==="financeiro"&&<Fn motos={motos} financeiro={fin} onAdd={async i=>await sf([...fin,i])} onRem={async id=>await sf(fin.filter(f=>f.id!==id))}/>}
      {tela==="relatorios"&&<Rl motos={motos}/>}
      {tela==="nova"&&(<div style={{background:"#fff",borderRadius:16,padding:24,border:"1.5px solid #eee"}}><h2 style={{margin:"0 0 20px",fontSize:18}}>Cadastrar Nova Moto</h2><Mf onSave={savMoto} onCancel={()=>setTela("estoque")}/></div>)}
      {tela==="editar"&&edit&&(<div style={{background:"#fff",borderRadius:16,padding:24,border:"1.5px solid #eee"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{margin:0,fontSize:18}}>{edit.marca} {edit.modelo} {edit.placa}</h2>
          <button onClick={()=>delMoto(edit.id)} style={{background:"#fff",color:"#c62828",border:"1.5px solid #c62828",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}>Remover</button>
        </div>
        <Mf initial={edit} onSave={savMoto} onCancel={()=>{setTela("estoque");setEdit(null);}}/>
      </div>)}
    </div>
  </div>);}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
