      {fl.map(c=>(<div key={c.id} style={{padding:"12px 16px",borderBottom:"1px solid #f5f5f5",background:c.pago?"#f9fdf9":(!c.pago&&c.vencimento&&c.vencimento<=hoje)?"#fff8e1":"#fff"}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
          <button onClick={()=>tg(c.id)} style={{width:22,height:22,borderRadius:"50%",border:"2px solid "+(c.pago?"#43a047":(!c.pago&&c.vencimento&&c.vencimento<=hoje)?"#ffa000":"#ddd"),background:c.pago?"#43a047":"#fff",cursor:"pointer",flexShrink:0,marginTop:2,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:700}}>{c.pago?"V":""}</button>
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <div>
                <span style={{fontWeight:700,fontSize:14,color:c.pago?"#888":"#1a1a1a",textDecoration:c.pago?"line-through":"none"}}>{c.desc}</span>
                {c.fixa&&<span style={{marginLeft:6,fontSize:10,background:"#e3f2fd",color:"#1565c0",padding:"2px 6px",borderRadius:10,fontWeight:700}}>FIXA</span>}
                {!c.pago&&c.vencimento&&c.vencimento<=hoje&&<span style={{marginLeft:6,fontSize:10,background:"#fff3e0",color:"#e65100",padding:"2px 6px",borderRadius:10,fontWeight:700}}>VENCIDA</span>}
                <span style={{marginLeft:6,fontSize:10,background:(CR[c.cat]||"#888")+"22",color:CR[c.cat]||"#333",padding:"2px 6px",borderRadius:10,fontWeight:700}}>{c.cat}</span>
              </div>
              <span style={{fontWeight:800,fontSize:15,color:c.pago?"#2e7d32":"#c62828"}}>{fm(c.val)}</span>
            </div>
            <div style={{display:"flex",gap:16,marginTop:6,flexWrap:"wrap"}}>
              <div style={{display:"flex",flexDirection:"column",gap:2}}><span style={{fontSize:10,color:"#aaa",fontWeight:700}}>VENCIMENTO</span><input type="date" value={c.vencimento||""} onChange={e=>up(c.id,"vencimento",e.target.value)} style={{border:"1px solid #eee",borderRadius:6,padding:"3px 6px",fontSize:12,outline:"none"}}/></div>
              <div style={{display:"flex",flexDirection:"column",gap:2}}><span style={{fontSize:10,color:"#aaa",fontWeight:700}}>VALOR</span><input type="number" value={c.val} onChange={e=>up(c.id,"val",Number(e.target.value))} style={{border:"1px solid #eee",borderRadius:6,padding:"3px 6px",fontSize:12,outline:"none",width:90}}/></div>
              {c.pago&&<div style={{display:"flex",flexDirection:"column",gap:2}}><span style={{fontSize:10,color:"#aaa",fontWeight:700}}>PAGO EM</span><input type="date" value={c.dataPgto||""} onChange={e=>up(c.id,"dataPgto",e.target.value)} style={{border:"1px solid #eee",borderRadius:6,padding:"3px 6px",fontSize:12,outline:"none"}}/></div>}
            </div>
          </div>
          <button onClick={()=>rm(c.id)} style={{border:"none",background:"none",color:"#ddd",cursor:"pointer",fontSize:16}}>X</button>
        </div>
      </div>))}
    </div>
  </div>);}function App(){
  const[motos,setMotos]=useState([]);const[fin,setFin]=useState([]);const[contas,setContas]=useState([]);
  const[tela,setTela]=useState("dashboard");const[edit,setEdit]=useState(null);
  const[busca,setBusca]=useState("");const[fst,setFst]=useState("Todos");
  const[load,setLoad]=useState(true);const[salv,setSalv]=useState(false);const[erro,setErro]=useState(null);
  useEffect(()=>{async function init(){try{
    const[m,f,c]=await Promise.all([rb(BM),rb(BF),rb(BC)]);
    setMotos(m);setFin(f);setContas(c);
  }catch(e){setErro("Erro ao conectar.");}finally{setLoad(false);}}init();},[]);
  const sm=async n=>{setSalv(true);setMotos(n);try{await wb(BM,n);}catch{alert("Erro ao salvar.");}setSalv(false);};
  const sf=async n=>{setSalv(true);setFin(n);try{await wb(BF,n);}catch{alert("Erro ao salvar.");}setSalv(false);};
  const sc=async n=>{setSalv(true);setContas(n);try{await wb(BC,n);}catch{alert("Erro ao salvar.");}setSalv(false);};
  const savMoto=async m=>{const n=edit?motos.map(x=>x.id===m.id?m:x):[...motos,m];await sm(n);setTela("estoque");setEdit(null);};
  const delMoto=async id=>{if(!confirm("Remover?"))return;await sm(motos.filter(m=>m.id!==id));setTela("estoque");setEdit(null);};
  const totalCustoEstoque=motos.filter(m=>m.status!=="Vendida").reduce((s,m)=>s+custoTotal(m),0);
  const totalVendaEstoque=motos.filter(m=>m.status!=="Vendida").reduce((s,m)=>s+Number(m.precoVenda||0),0);
  const mf=motos.filter(m=>{const q=busca.toLowerCase();const ok=!q||[m.marca,m.modelo,m.placa,m.vendedorNome,m.compradorNome].some(v=>(v||"").toLowerCase().includes(q));return ok&&(fst==="Todos"||m.status===fst);});
  const NV=[{id:"dashboard",icon:"📊",label:"Painel"},{id:"estoque",icon:"🏍️",label:"Estoque"},{id:"contas",icon:"🧾",label:"Contas"},{id:"financeiro",icon:"💰",label:"Financeiro"},{id:"relatorios",icon:"📈",label:"Relatorios"}];
  if(load)return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:12}}><span style={{fontSize:40}}>🏍️</span><p style={{color:"#c62828",fontWeight:700,fontSize:16}}>Conectando...</p></div>);
  if(erro)return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:12,padding:20,textAlign:"center"}}><span style={{fontSize:40}}>⚠️</span><p style={{color:"#c62828",fontWeight:700}}>{erro}</p><button onClick={()=>window.location.reload()} style={{padding:"10px 20px",background:"#c62828",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700}}>Tentar novamente</button></div>);
  return(<div style={{fontFamily:"system-ui,sans-serif",background:"#f7f7f7",minHeight:"100vh"}}>
    <div style={{background:"#c62828",color:"#fff",padding:"0 20px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56,boxShadow:"0 2px 8px #0003",position:"sticky",top:0,zIndex:100}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:22}}>🏍️</span><div><p style={{margin:0,fontWeight:900,fontSize:16,lineHeight:1}}>PTK MOTOS</p><p style={{margin:0,fontSize:10,opacity:.8,lineHeight:1}}>{salv?"Salvando...":"Online"}</p></div></div>
      {["dashboard","estoque"].includes(tela)&&<button onClick={()=>{setEdit(null);setTela("nova");}} style={{background:"#fff",color:"#c62828",border:"none",borderRadius:8,padding:"7px 14px",fontWeight:700,cursor:"pointer",fontSize:13}}>+ Nova Moto</button>}
      {["nova","editar"].includes(tela)&&<button onClick={()=>{setTela("estoque");setEdit(null);}} style={{background:"transparent",color:"#fff",border:"1px solid #ffffff66",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:13}}>Voltar</button>}
    </div>
    <div style={{background:"#fff",borderBottom:"1.5px solid #eee",display:"flex",padding:"0 12px",overflowX:"auto",position:"sticky",top:56,zIndex:99}}>
      {NV.map(n=>(<button key={n.id} onClick={()=>setTela(n.id)} style={{background:"none",border:"none",padding:"12px 14px",cursor:"pointer",fontSize:13,fontWeight:600,whiteSpace:"nowrap",color:tela===n.id?"#c62828":"#666",borderBottom:tela===n.id?"2.5px solid #c62828":"2.5px solid transparent"}}>{n.icon} {n.label}</button>))}
    </div>
    <div style={{maxWidth:900,margin:"0 auto",padding:"20px 16px"}}>
      {tela==="dashboard"&&<Db motos={motos}/>}
      {tela==="estoque"&&(<div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar marca, placa, nome..." style={{flex:1,minWidth:180,border:"1.5px solid #ddd",borderRadius:8,padding:"9px 12px",fontSize:14,outline:"none"}}/>
          <select value={fst} onChange={e=>setFst(e.target.value)} style={{border:"1.5px solid #ddd",borderRadius:8,padding:"9px 12px",fontSize:14,background:"#fff",outline:"none"}}><option>Todos</option>{Object.keys(SC).map(s=><option key={s}>{s}</option>)}</select>
        </div>
        {mf.length===0?<div style={{textAlign:"center",padding:"40px 0",color:"#aaa"}}><p style={{fontSize:40}}>🏍️</p><p style={{fontWeight:600}}>{busca?"Nenhuma moto encontrada":"Nenhuma moto cadastrada"}</p></div>
        :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14}}>{mf.map(m=><Mc key={m.id} moto={m} onClick={()=>{setEdit(m);setTela("editar");}} totalEstoque={totalCustoEstoque} totalVendas={totalVendaEstoque}/>)}</div>}
      </div>)}
      {tela==="contas"&&<Co contas={contas} onSave={sc}/>}
      {tela==="financeiro"&&<Fn motos={motos} financeiro={fin} onAdd={async i=>await sf([...fin,i])} onRem={async id=>await sf(fin.filter(f=>f.id!==id))}/>}
      {tela==="relatorios"&&<Rl motos={motos}/>}
      {tela==="nova"&&(<div style={{background:"#fff",borderRadius:16,padding:24,border:"1.5px solid #eee"}}><h2 style={{margin:"0 0 20px",fontSize:18}}>Cadastrar Nova Moto</h2><Mf onSave={savMoto} onCancel={()=>setTela("estoque")}/></div>)}
      {tela==="editar"&&edit&&(<div style={{background:"#fff",borderRadius:16,padding:24,border:"1.5px solid #eee"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{margin:0,fontSize:18}}>{edit.marca} {edit.modelo} {edit.placa}</h2>
          <button onClick={()=>delMoto(edit.id)} style={{background:"#fff",color:"#c62828",border:"1.5px solid #c62828",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}>Remover</button>
        </div>
        <Mf initial={edit} onSave={savMoto} onCancel={()=>{setTela("estoque");setEdit(null);}}/>
      </div>)}
    </div>
  </div>);}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
